name: release/build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

env:
  IMAGE_NAME: diagrid-piko

jobs:
  publish-image:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Google Credentials
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Docker Auth (GCP)
        uses: docker/login-action@v3
        with:
          registry: '${{ secrets.GCP_CONTAINER_REGISTRY_HOST }}'
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'

      - name: Compute tags
        id: tags
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          GCP_IMAGE="${{ secrets.GCP_CONTAINER_REGISTRY_HOST }}/${{ secrets.GCP_DOCKER_PUBLIC_REPOSITORY }}/${IMAGE_NAME}"
          echo "tags=${GCP_IMAGE}:${{ github.ref_name }},${GCP_IMAGE}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile
          build-args: version=${{ github.ref_name }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
