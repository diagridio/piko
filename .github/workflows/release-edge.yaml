name: release/edge

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'operations/**'
      - 'demo/**'
      - 'monitoring/**'
      - '.github/dependabot.yml'

permissions:
  contents: read
  id-token: write

env:
  IMAGE_NAME: diagrid-piko

jobs:
  publish-edge:
    runs-on: ubuntu-latest
    environment: development
    env:
      GCP_DOCKER_PUBLIC_REPOSITORY: '${{ secrets.GCP_DOCKER_PUBLIC_REPOSITORY }}'
      GCP_CONTAINER_REGISTRY_HOST: '${{ secrets.GCP_CONTAINER_REGISTRY_HOST }}'
      AWS_ECR_PUSH_ROLE: '${{ secrets.AWS_ECR_PUSH_ROLE_STAGING }}'
      AWS_ECR_REGISTRY_HOST: '${{ secrets.AWS_ECR_REGISTRY_HOST_STAGING }}'
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Google Credentials
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Docker Auth (GCP)
        uses: docker/login-action@v3
        with:
          registry: '${{ secrets.GCP_CONTAINER_REGISTRY_HOST }}'
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'

      - name: Configure AWS credentials
        if: github.repository_owner == 'diagridio'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ECR_PUSH_ROLE }}
          aws-region: eu-west-1

      - name: Docker login to AWS ECR
        if: github.repository_owner == 'diagridio'
        run: |
          aws ecr get-login-password --region eu-west-1 | docker login --username AWS --password-stdin "${AWS_ECR_REGISTRY_HOST}"

      - name: Ensure ECR repository exists
        if: github.repository_owner == 'diagridio'
        run: |
          ECR_REPO="staging/${IMAGE_NAME}"
          aws ecr describe-repositories --region eu-west-1 --repository-names "${ECR_REPO}" >/dev/null 2>&1 || \
            aws ecr create-repository \
              --region eu-west-1 \
              --repository-name "${ECR_REPO}" \
              --image-scanning-configuration scanOnPush=true \
              --encryption-configuration encryptionType=AES256 \
              --tags Key=environment,Value=development Key=managed-by,Value=github-actions >/dev/null

      - name: Compute tags
        id: tags
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          GCP_IMAGE="${GCP_CONTAINER_REGISTRY_HOST}/${GCP_DOCKER_PUBLIC_REPOSITORY}/${IMAGE_NAME}"

          TAGS="${GCP_IMAGE}:edge,${GCP_IMAGE}:${SHORT_SHA}"
          if [ "${{ github.repository_owner }}" = "diagridio" ]; then
            ECR_IMAGE="${AWS_ECR_REGISTRY_HOST}/staging/${IMAGE_NAME}"
            TAGS="${TAGS},${ECR_IMAGE}:edge,${ECR_IMAGE}:${SHORT_SHA}"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile
          build-args: version=edge-${{ steps.tags.outputs.short_sha }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
